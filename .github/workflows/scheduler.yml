name: Hourly Auto Scheduler

on:
  workflow_dispatch:
    inputs:
      total_accounts_override:
        description: '手动指定本次注册数量；留空则按缺口自动补足'
        required: false
        default: ''

jobs:
  run-scheduler:
    runs-on: ubuntu-latest
    env:
      MAIL_PROVIDER: duckmail
      DUCK_ADDRESS_FILE: duckaddress.txt

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          python -m playwright install chromium --with-deps

      - name: Diagnose CPA DNS
        env:
          UPLOAD_API_URL: ${{ secrets.UPLOAD_API_URL }}
        run: |
          python - <<'PY'
          from urllib.parse import urlparse
          import socket
          import os

          raw = os.environ.get("UPLOAD_API_URL", "").strip()
          parsed = urlparse(raw)
          print(f"UPLOAD_API_URL set: {'yes' if raw else 'no'}")
          host = parsed.hostname or ""
          if not host:
              print("CPA endpoint host present: no")
          else:
              try:
                  socket.getaddrinfo(host, parsed.port or 443)
                  print("CPA endpoint DNS lookup: success")
              except Exception:
                  print("CPA endpoint DNS lookup: failed")
          print(f"CPA endpoint scheme valid: {'yes' if parsed.scheme in ('http', 'https') else 'no'}")
          PY

      - name: Diagnose Wildmail
        if: ${{ env.MAIL_PROVIDER == 'wildmail' }}
        continue-on-error: true
        env:
          WILDMAIL_API_BASE: ${{ secrets.WILDMAIL_API_BASE }}
          WILDMAIL_API_KEY: ${{ secrets.WILDMAIL_API_KEY }}
        run: |
          if [ -n "${WILDMAIL_API_BASE}" ] && [ -n "${WILDMAIL_API_KEY}" ]; then
            python -u scripts/diagnose_wildmail.py || echo "Wildmail diagnose failed, continue because cfmail is primary"
          else
            echo "WILDMAIL secrets not configured, skip diagnose"
          fi

      - name: Restore duck pool cache
        if: ${{ env.MAIL_PROVIDER == 'duckmail' }}
        uses: actions/cache@v4
        with:
          path: duckaddress.txt
          key: duck-pool-v1-${{ github.run_id }}
          restore-keys: |
            duck-pool-v1-

      - name: Restore cfmail accounts cache
        if: ${{ env.MAIL_PROVIDER == 'cfmail' }}
        uses: actions/cache@v4
        with:
          path: zhuce5_cfmail_accounts.json
          key: cfmail-accounts-v2-${{ github.run_id }}
          restore-keys: |
            cfmail-accounts-v2-

      - name: Diagnose cfmail connectivity
        if: ${{ env.MAIL_PROVIDER == 'cfmail' }}
        continue-on-error: true
        env:
          CFMAIL_WORKER_DOMAIN: ${{ secrets.CFMAIL_WORKER_DOMAIN }}
          CFMAIL_EMAIL_DOMAIN: ${{ secrets.CFMAIL_EMAIL_DOMAIN }}
          CFMAIL_ADMIN_PASSWORD: ${{ secrets.CFMAIL_ADMIN_PASSWORD }}
        run: |
          python -u -c "
          import os, json
          from curl_cffi import requests as r
          wd = os.environ.get('CFMAIL_WORKER_DOMAIN','').strip()
          active_domain = ''
          accounts_path = 'zhuce5_cfmail_accounts.json'
          if os.path.exists(accounts_path):
              try:
                  with open(accounts_path, 'r', encoding='utf-8') as f:
                      payload = json.load(f)
                  raw_accounts = payload.get('accounts') if isinstance(payload, dict) else payload if isinstance(payload, list) else []
                  if isinstance(raw_accounts, list):
                      for item in raw_accounts:
                          if not isinstance(item, dict):
                              continue
                          if not item.get('enabled', True):
                              continue
                          candidate = str(item.get('email_domain') or '').strip()
                          if candidate:
                              active_domain = candidate
                              break
              except Exception as e:
                  print(f'WARN: failed to read {accounts_path}: {e}')
          ed = active_domain or os.environ.get('CFMAIL_EMAIL_DOMAIN','').strip()
          ap = os.environ.get('CFMAIL_ADMIN_PASSWORD','').strip()
          print(f'WORKER_DOMAIN set: {bool(wd)} len={len(wd)}')
          print(f'EMAIL_DOMAIN set: {bool(ed)} len={len(ed)}')
          print(f'ACTIVE_CONFIG_DOMAIN: {active_domain or \"<none>\"}')
          print(f'ADMIN_PASSWORD set: {bool(ap)} len={len(ap)}')
          if not (wd and ed and ap):
              print('ERROR: cfmail secrets incomplete'); exit(1)
          url = f'https://{wd}/admin/new_address'
          print(f'Testing POST {url} domain={ed}')
          try:
              resp = r.post(url, json={'enablePrefix':True,'name':'diagtest','domain':ed},
                  headers={'x-admin-auth':ap,'Content-Type':'application/json'},
                  timeout=15, impersonate='chrome')
              print(f'Status: {resp.status_code}')
              print(f'Body: {resp.text[:300]}')
              if resp.status_code==200:
                  d=resp.json(); print(f'OK email={d.get(\"address\")} jwt_len={len(d.get(\"jwt\",\"\"))}')
              else:
                  print('FAIL - check secrets values')
          except Exception as e:
              print(f'Exception: {e}')
          "

      - name: Inspect duck pool
        if: ${{ env.MAIL_PROVIDER == 'duckmail' }}
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path("duckaddress.txt")
          if not path.exists():
              raise SystemExit("duckaddress.txt is missing in repository checkout")
          addresses = [line.strip() for line in path.read_text(encoding="utf-8").splitlines() if line.strip()]
          print(f"Duck pool file: {path}")
          print(f"Duck pool count: {len(addresses)}")
          print(f"Duck pool first: {addresses[0] if addresses else '<empty>'}")
          PY

      - name: Run auto_scheduler
        env:
          PYTHONUNBUFFERED: 1
          AUTO_SCHEDULER_FORCE_TOTAL_ACCOUNTS: ${{ github.event.inputs.total_accounts_override || '' }}
          MAIL_PROVIDER: ${{ env.MAIL_PROVIDER }}
          DUCK_ADDRESS_FILE: ${{ env.DUCK_ADDRESS_FILE }}
          DUCK_EMAIL_BEARERS: ${{ secrets.DUCK_EMAIL_BEARERS }}
          QQ_EMAIL: ${{ secrets.QQ_EMAIL }}
          QQ_AUTH_CODE: ${{ secrets.QQ_AUTH_CODE }}
          QQ_IMAP_SERVER: ${{ secrets.QQ_IMAP_SERVER }}
          QQ_IMAP_PORT: ${{ secrets.QQ_IMAP_PORT }}
          MAIL_FOLDER: ${{ secrets.MAIL_FOLDER }}
          POLL_INTERVAL_SECONDS: ${{ secrets.POLL_INTERVAL_SECONDS }}
          POLL_TIMEOUT_SECONDS: ${{ secrets.POLL_TIMEOUT_SECONDS }}
          ZHUCE6_CFMAIL_ACTIVE_DOMAIN_COUNT: 2
          CFMAIL_WORKER_DOMAIN: ${{ secrets.CFMAIL_WORKER_DOMAIN }}
          CFMAIL_EMAIL_DOMAIN: ${{ secrets.CFMAIL_EMAIL_DOMAIN }}
          CFMAIL_ADMIN_PASSWORD: ${{ secrets.CFMAIL_ADMIN_PASSWORD }}
          LAMAIL_DOMAIN: ${{ secrets.LAMAIL_DOMAIN }}
          LAMAIL_API_KEY: ${{ secrets.LAMAIL_API_KEY }}
          WILDMAIL_API_BASE: ${{ secrets.WILDMAIL_API_BASE }}
          WILDMAIL_API_KEY: ${{ secrets.WILDMAIL_API_KEY }}
          UPLOAD_API_URL: ${{ secrets.UPLOAD_API_URL }}
          UPLOAD_API_TOKEN: ${{ secrets.UPLOAD_API_TOKEN }}
          PROXY: ${{ secrets.PROXY }}
          UPLOAD_API_PROXY: ${{ secrets.UPLOAD_API_PROXY }}
          CF_AUTH_EMAIL: ${{ secrets.CF_AUTH_EMAIL }}
          CF_AUTH_KEY: ${{ secrets.CF_AUTH_KEY }}
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          CF_ZONE_ID: ${{ secrets.CF_ZONE_ID }}
          CF_WORKER_NAME: ${{ secrets.CF_WORKER_NAME }}
          CF_ZONE_NAME: ${{ secrets.CF_ZONE_NAME }}
        run: |
          # 如果系统有 `uv` 命令则使用用户期望的命令，否则降级执行 python
          if command -v uv >/dev/null 2>&1; then
            uv run auto_scheduler.py
          else
            python -u auto_scheduler.py
          fi

      - name: Save duck pool cache
        if: ${{ always() && env.MAIL_PROVIDER == 'duckmail' }}
        uses: actions/cache/save@v4
        with:
          path: duckaddress.txt
          key: duck-pool-v1-${{ github.run_id }}

      - name: Commit duck pool updates
        if: ${{ always() && env.MAIL_PROVIDER == 'duckmail' }}
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          if ! git diff --quiet -- duckaddress.txt; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add duckaddress.txt
            git commit -m "Update duckaddress pool after scheduler run"
            git push origin HEAD:${GITHUB_REF_NAME}
          else
            echo "duckaddress.txt unchanged"
          fi

      - name: Save cfmail accounts cache
        if: ${{ always() && env.MAIL_PROVIDER == 'cfmail' }}
        uses: actions/cache/save@v4
        with:
          path: zhuce5_cfmail_accounts.json
          key: cfmail-accounts-v2-${{ github.run_id }}
