name: Hourly Auto Scheduler

on:
  schedule:
    - cron: '3,33 * * * *'  # 每30分钟固定错峰执行，避开整点高峰
  workflow_dispatch: {}

jobs:
  run-scheduler:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          python -m playwright install chromium --with-deps

      - name: Diagnose CPA DNS
        env:
          UPLOAD_API_URL: ${{ secrets.UPLOAD_API_URL }}
        run: |
          python - <<'PY'
          from urllib.parse import urlparse
          import socket
          import os

          raw = os.environ.get("UPLOAD_API_URL", "").strip()
          parsed = urlparse(raw)
          print(f"UPLOAD_API_URL set: {'yes' if raw else 'no'}")
          host = parsed.hostname or ""
          if not host:
              print("CPA endpoint host present: no")
          else:
              try:
                  socket.getaddrinfo(host, parsed.port or 443)
                  print("CPA endpoint DNS lookup: success")
              except Exception:
                  print("CPA endpoint DNS lookup: failed")
          print(f"CPA endpoint scheme valid: {'yes' if parsed.scheme in ('http', 'https') else 'no'}")
          PY

      - name: Diagnose Wildmail
        continue-on-error: true
        env:
          WILDMAIL_API_BASE: ${{ secrets.WILDMAIL_API_BASE }}
          WILDMAIL_API_KEY: ${{ secrets.WILDMAIL_API_KEY }}
        run: |
          if [ -n "${WILDMAIL_API_BASE}" ] && [ -n "${WILDMAIL_API_KEY}" ]; then
            python -u scripts/diagnose_wildmail.py || echo "Wildmail diagnose failed, continue because cfmail is primary"
          else
            echo "WILDMAIL secrets not configured, skip diagnose"
          fi

      - name: Restore cfmail accounts cache
        uses: actions/cache@v4
        with:
          path: zhuce5_cfmail_accounts.json
          key: cfmail-accounts-v2-${{ github.run_id }}
          restore-keys: |
            cfmail-accounts-v2-

      - name: Diagnose cfmail connectivity
        continue-on-error: true
        env:
          CFMAIL_WORKER_DOMAIN: ${{ secrets.CFMAIL_WORKER_DOMAIN }}
          CFMAIL_EMAIL_DOMAIN: ${{ secrets.CFMAIL_EMAIL_DOMAIN }}
          CFMAIL_ADMIN_PASSWORD: ${{ secrets.CFMAIL_ADMIN_PASSWORD }}
        run: |
          python -u -c "
          import os, json
          from curl_cffi import requests as r
          wd = os.environ.get('CFMAIL_WORKER_DOMAIN','').strip()
          ed = os.environ.get('CFMAIL_EMAIL_DOMAIN','').strip()
          ap = os.environ.get('CFMAIL_ADMIN_PASSWORD','').strip()
          print(f'WORKER_DOMAIN set: {bool(wd)} len={len(wd)}')
          print(f'EMAIL_DOMAIN set: {bool(ed)} len={len(ed)}')
          print(f'ADMIN_PASSWORD set: {bool(ap)} len={len(ap)}')
          if not (wd and ed and ap):
              print('ERROR: cfmail secrets incomplete'); exit(1)
          url = f'https://{wd}/admin/new_address'
          print(f'Testing POST {url} domain={ed}')
          try:
              resp = r.post(url, json={'enablePrefix':True,'name':'diagtest','domain':ed},
                  headers={'x-admin-auth':ap,'Content-Type':'application/json'},
                  timeout=15, impersonate='chrome')
              print(f'Status: {resp.status_code}')
              print(f'Body: {resp.text[:300]}')
              if resp.status_code==200:
                  d=resp.json(); print(f'OK email={d.get(\"address\")} jwt_len={len(d.get(\"jwt\",\"\"))}')
              else:
                  print('FAIL - check secrets values')
          except Exception as e:
              print(f'Exception: {e}')
          "

      - name: Run auto_scheduler
        env:
          PYTHONUNBUFFERED: 1
          MAIL_PROVIDER: cfmail
          CFMAIL_WORKER_DOMAIN: ${{ secrets.CFMAIL_WORKER_DOMAIN }}
          CFMAIL_EMAIL_DOMAIN: ${{ secrets.CFMAIL_EMAIL_DOMAIN }}
          CFMAIL_ADMIN_PASSWORD: ${{ secrets.CFMAIL_ADMIN_PASSWORD }}
          LAMAIL_DOMAIN: ${{ secrets.LAMAIL_DOMAIN }}
          LAMAIL_API_KEY: ${{ secrets.LAMAIL_API_KEY }}
          WILDMAIL_API_BASE: ${{ secrets.WILDMAIL_API_BASE }}
          WILDMAIL_API_KEY: ${{ secrets.WILDMAIL_API_KEY }}
          UPLOAD_API_URL: ${{ secrets.UPLOAD_API_URL }}
          UPLOAD_API_TOKEN: ${{ secrets.UPLOAD_API_TOKEN }}
          PROXY: ${{ secrets.PROXY }}
          UPLOAD_API_PROXY: ${{ secrets.UPLOAD_API_PROXY }}
          CF_AUTH_EMAIL: ${{ secrets.CF_AUTH_EMAIL }}
          CF_AUTH_KEY: ${{ secrets.CF_AUTH_KEY }}
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          CF_ZONE_ID: ${{ secrets.CF_ZONE_ID }}
          CF_WORKER_NAME: ${{ secrets.CF_WORKER_NAME }}
          CF_ZONE_NAME: ${{ secrets.CF_ZONE_NAME }}
        run: |
          # 如果系统有 `uv` 命令则使用用户期望的命令，否则降级执行 python
          if command -v uv >/dev/null 2>&1; then
            uv run auto_scheduler.py
          else
            python -u auto_scheduler.py
          fi

      - name: Save cfmail accounts cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: zhuce5_cfmail_accounts.json
          key: cfmail-accounts-v2-${{ github.run_id }}
